name: dog_detection
description: "Dog face and landmark detection using on-device TFLite models."
version: 1.0.9
homepage: https://github.com/hugocornellier/dog_detection
repository: https://github.com/hugocornellier/dog_detection

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  animal_detection: ^1.0.8
  opencv_dart: ^2.2.1+4
  flutter_litert: ^2.5.0
  meta: ^1.17.0
  http: ^1.3.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  assets:
    - assets/models/dog_face_localizer.tflite
    - assets/models/dog_face_landmarks_full.tflite
    - assets/samples/

  plugin:
    platforms:
      ios:
        dartPluginClass: DogDetectionDart
      android:
        dartPluginClass: DogDetectionDart
      macos:
        pluginClass: DogDetectionPlugin
      windows:
        pluginClass: DogDetectionPlugin
      linux:
        pluginClass: DogDetectionPlugin
